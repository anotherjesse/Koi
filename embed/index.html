<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Koi world component</title>
    <link rel="stylesheet" href="demo.css">
</head>
<body>
<main>
    <header>
        <div>
            <h1>Koi World, embedded</h1>
            <p>The live renderer is a standalone <code>&lt;koi-world&gt;</code> component—no pond chooser, settings menu, cards, or tutorial overlay.</p>
        </div>
        <nav><a href="system.html">View the full system →</a></nav>
    </header>
    <div class="world-toolbar">
        <p class="status" id="status">Loading the world…</p>
        <div class="world-controls" role="group" aria-label="Choose a host-managed world">
            <button type="button" data-save-key="world-demo:garden" class="active">Garden</button>
            <button type="button" data-save-key="world-demo:courtyard">Courtyard</button>
        </div>
    </div>
    <koi-world save-key="world-demo:garden" title="Standalone Koi world"></koi-world>
</main>
<script type="module">
    import "./koi-farm.js";

    const world = document.querySelector("koi-world");
    const status = document.getElementById("status");
    const worldButtons = document.querySelectorAll("[data-save-key]");
    let live = false;

    for (const button of worldButtons)
        button.addEventListener("click", () => world.load(button.dataset.saveKey));

    world.addEventListener("koi-world:ready", event => {
        if (!live)
            status.textContent = `Runtime ready (${event.detail.locale}); preparing the pond…`;
    });

    world.addEventListener("koi-world:session", event => {
        live = true;
        status.textContent = `World “${event.detail.saveKey}” is live (${event.detail.resumed ? "resumed" : "new"})`;

        for (const button of worldButtons)
            button.classList.toggle("active", button.dataset.saveKey === event.detail.saveKey);
    });
</script>
</body>
</html>
