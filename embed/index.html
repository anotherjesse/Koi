<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Koi world component</title>
    <link rel="stylesheet" href="demo.css">
</head>
<body>
<main>
    <header>
        <div>
            <h1>Koi World, embedded</h1>
            <p>The live renderer is a standalone <code>&lt;koi-world&gt;</code> component—no pond chooser, settings menu, cards, or tutorial overlay.</p>
        </div>
        <nav><a href="system.html">View the full system →</a></nav>
    </header>
    <p class="status" id="status">Loading the world…</p>
    <koi-world storage-key="world-demo" pond="0" title="Standalone Koi world"></koi-world>
</main>
<script type="module">
    import "./koi-farm.js";

    const world = document.querySelector("koi-world");
    const status = document.getElementById("status");
    let live = false;

    world.addEventListener("koi-world:ready", event => {
        if (!live)
            status.textContent = `Runtime ready (${event.detail.locale}); preparing the pond…`;
    });

    world.addEventListener("koi-world:session", event => {
        live = true;
        status.textContent = `Pond ${event.detail.pond + 1} is live`;
    });
</script>
</body>
</html>
